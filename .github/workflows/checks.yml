name: Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}

      # Fails if CLAUDE.md's generated component reference or the preview
      # registry are stale relative to src/data/components/*.ts. Fix locally
      # with `npm run docs` and commit the result.
      - name: Check generated docs are in sync
        run: npm run check-docs

      - name: Type-check
        run: npx tsc --noEmit
