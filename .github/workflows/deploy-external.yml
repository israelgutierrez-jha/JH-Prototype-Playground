name: Deploy external gallery

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}

      - name: Prune non-public prototypes
        run: npm run prune-private

      - name: Build (external)
        run: npm run build:external
        env:
          # NOT GITHUB_REPOSITORY — that's a GitHub Actions default env var
          # and overriding it via `env:` is silently ignored, so vite.config.ts
          # reads this separate variable instead for this build's asset base
          # path (this build publishes to a different repo/Pages site).
          BASE_REPO_NAME: JH-Prototype-Playground-External

      - name: Publish to external repo's gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.EXTERNAL_REPO_TOKEN }}
          external_repository: israelgutierrez-jha/JH-Prototype-Playground-External
          publish_branch: gh-pages
          publish_dir: ./dist
